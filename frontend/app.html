<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#16a34a">
  <meta name="description" content="Asset Risk Assurance — scope determination questionnaire for security assessments">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="ARA App">

  <title>ARA — Asset Risk Assurance</title>

  <link rel="manifest" href="/manifest.json">
  <link rel="icon" type="image/svg+xml" href="/icons/icon-192.svg">
  <link rel="apple-touch-icon" href="/icons/icon-192.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

  <!-- Auth guard — fires before render -->
  <script src="/js/auth.js"></script>
  <script>auth.guard();</script>

  <header class="app-header">
    <div class="logo">
      <div class="logo-icon">ARA</div>
      <h1>
        Asset Risk Assurance
        <span>Scope Determination Tool</span>
      </h1>
    </div>
    <nav>
      <span id="user-greeting" style="font-size:.8rem;color:var(--text-muted);margin-right:.5rem"></span>
      <button class="nav-btn active" data-view="questionnaire">
        <svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" style="display:inline;vertical-align:middle">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
        </svg>
        <span> New</span>
      </button>
      <button class="nav-btn" data-view="history">
        <svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" style="display:inline;vertical-align:middle">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/>
        </svg>
        <span> History</span>
      </button>
      <button class="nav-btn" id="btn-notify" title="Enable push notifications" style="display:none">
        <svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" style="display:inline;vertical-align:middle">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6 6 0 10-12 0v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/>
        </svg>
        <span id="notify-label"> Notify</span>
      </button>
      <button class="nav-btn" id="btn-logout">
        <svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" style="display:inline;vertical-align:middle">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a2 2 0 01-2 2H5a2 2 0 01-2-2V7a2 2 0 012-2h6a2 2 0 012 2v1"/>
        </svg>
        <span> Sign Out</span>
      </button>
    </nav>
  </header>

  <main>
    <div id="app">
      <!-- Rendered by app.js -->
    </div>
  </main>

  <!-- Loading Overlay -->
  <div id="loading-overlay" class="loading-overlay hidden">
    <div class="spinner"></div>
  </div>

  <script src="/js/app.js"></script>
</body>
</html>
