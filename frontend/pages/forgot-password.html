<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password — ARA</title>
  <link rel="icon" type="image/svg+xml" href="/icons/icon-192.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#0a0a0a;--surface:#141414;--border:#363636;--text:#ecfdf5;--muted:#6b8f78;--primary:#16a34a;--primary-h:#15803d;--success:#4ade80;--danger:#ef4444}
    body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:grid;place-items:center;padding:2rem 1rem}
    body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 70% 50% at 50% 0,rgba(22,163,74,.12),transparent);pointer-events:none}
    .auth-box{width:100%;max-width:420px;background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:2.5rem}
    .auth-logo{display:flex;align-items:center;gap:.75rem;margin-bottom:2rem;text-decoration:none}
    .logo-chip{background:var(--primary);color:#fff;font-weight:800;font-size:.95rem;padding:.3rem .7rem;border-radius:7px}
    .auth-logo span{font-weight:600;color:var(--muted);font-size:.9rem}
    h1{font-size:1.4rem;font-weight:700;margin-bottom:.4rem}
    .subtitle{color:var(--muted);font-size:.875rem;margin-bottom:2rem;line-height:1.6}
    .form-group{margin-bottom:1.1rem}
    label{display:block;font-size:.85rem;font-weight:500;margin-bottom:.4rem}
    input{width:100%;background:#0a0a0a;border:1px solid var(--border);color:var(--text);border-radius:8px;padding:.65rem .9rem;font-size:.9rem;font-family:inherit;transition:.2s}
    input:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px rgba(22,163,74,.2)}
    .btn{display:block;width:100%;padding:.7rem;border-radius:8px;font-size:.95rem;font-weight:600;cursor:pointer;border:none;text-align:center;transition:.2s;font-family:inherit;margin-top:1.25rem}
    .btn-primary{background:var(--primary);color:#fff}
    .btn-primary:hover{background:var(--primary-h)}
    .btn-primary:disabled{opacity:.6;cursor:not-allowed}
    .footer-link{text-align:center;font-size:.85rem;color:var(--muted);margin-top:1.25rem}
    .footer-link a{color:var(--primary);text-decoration:none;font-weight:500}
    .footer-link a:hover{text-decoration:underline}
    .msg{border-radius:8px;padding:.8rem 1rem;font-size:.875rem;margin-bottom:1rem;display:none}
    .msg.show{display:block}
    .msg.success{background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.3);color:#86efac}
    .msg.error{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);color:#fca5a5}
  </style>
</head>
<body>
  <div class="auth-box">
    <a href="/" class="auth-logo">
      <div class="logo-chip">ARA</div>
      <span>Asset Risk Assurance</span>
    </a>

    <h1>Reset your password</h1>
    <p class="subtitle">Enter your email address and we'll send you a link to reset your password. The link expires after 1 hour.</p>

    <div class="msg" id="msg"></div>

    <form id="forgot-form" novalidate>
      <div class="form-group">
        <label for="email">Email address</label>
        <input type="email" id="email" placeholder="you@organisation.com" autocomplete="email" required>
      </div>
      <button type="submit" class="btn btn-primary" id="submit-btn">Send Reset Link</button>
    </form>

    <p class="footer-link"><a href="/pages/login.html">&larr; Back to Sign In</a></p>
  </div>

  <script src="/js/auth.js"></script>
  <script>
    const msgEl = document.getElementById('msg');
    function showMsg(text, type) {
      msgEl.textContent = text;
      msgEl.className = 'msg show ' + type;
    }

    document.getElementById('forgot-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      msgEl.className = 'msg';
      const email = document.getElementById('email').value.trim();
      if (!email) { showMsg('Please enter your email address.', 'error'); return; }

      const btn = document.getElementById('submit-btn');
      btn.disabled = true;
      btn.textContent = 'Sending…';
      try {
        await auth.forgotPassword(email);
        showMsg('If that email is registered, a reset link has been sent. Check your inbox.', 'success');
        document.getElementById('forgot-form').reset();
      } catch (err) {
        showMsg(err.message, 'error');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Send Reset Link';
      }
    });
  </script>
</body>
</html>
