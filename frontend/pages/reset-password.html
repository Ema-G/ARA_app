<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Set New Password — ARA</title>
  <link rel="icon" type="image/svg+xml" href="/icons/icon-192.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#0a0a0a;--surface:#141414;--border:#363636;--text:#ecfdf5;--muted:#6b8f78;--primary:#16a34a;--primary-h:#15803d;--success:#4ade80;--danger:#ef4444}
    body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:grid;place-items:center;padding:2rem 1rem}
    body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 70% 50% at 50% 0,rgba(22,163,74,.12),transparent);pointer-events:none}
    .auth-box{width:100%;max-width:420px;background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:2.5rem}
    .auth-logo{display:flex;align-items:center;gap:.75rem;margin-bottom:2rem;text-decoration:none}
    .logo-chip{background:var(--primary);color:#fff;font-weight:800;font-size:.95rem;padding:.3rem .7rem;border-radius:7px}
    .auth-logo span{font-weight:600;color:var(--muted);font-size:.9rem}
    h1{font-size:1.4rem;font-weight:700;margin-bottom:.4rem}
    .subtitle{color:var(--muted);font-size:.875rem;margin-bottom:2rem}
    .form-group{margin-bottom:1.1rem}
    label{display:block;font-size:.85rem;font-weight:500;margin-bottom:.4rem}
    input{width:100%;background:#0a0a0a;border:1px solid var(--border);color:var(--text);border-radius:8px;padding:.65rem .9rem;font-size:.9rem;font-family:inherit;transition:.2s}
    input:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px rgba(22,163,74,.2)}
    .btn{display:block;width:100%;padding:.7rem;border-radius:8px;font-size:.95rem;font-weight:600;cursor:pointer;border:none;text-align:center;transition:.2s;font-family:inherit;margin-top:1.25rem}
    .btn-primary{background:var(--primary);color:#fff}
    .btn-primary:hover{background:var(--primary-h)}
    .btn-primary:disabled{opacity:.6;cursor:not-allowed}
    .footer-link{text-align:center;font-size:.85rem;color:var(--muted);margin-top:1.25rem}
    .footer-link a{color:var(--primary);text-decoration:none;font-weight:500}
    .msg{border-radius:8px;padding:.8rem 1rem;font-size:.875rem;margin-bottom:1rem;display:none}
    .msg.show{display:block}
    .msg.success{background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.3);color:#86efac}
    .msg.error{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);color:#fca5a5}
    .invalid-token{text-align:center;padding:1rem 0}
    .invalid-token p{color:var(--muted);margin-bottom:1rem}
  </style>
</head>
<body>
  <div class="auth-box">
    <a href="/" class="auth-logo">
      <div class="logo-chip">ARA</div>
      <span>Asset Risk Assurance</span>
    </a>

    <div id="no-token" class="invalid-token" style="display:none">
      <h1>Invalid link</h1>
      <p>This password reset link is missing or invalid. Please request a new one.</p>
      <a href="/pages/forgot-password.html" class="btn btn-primary">Request a new link</a>
    </div>

    <div id="reset-form-wrapper">
      <h1>Set new password</h1>
      <p class="subtitle">Choose a strong password for your ARA account.</p>

      <div class="msg" id="msg"></div>

      <form id="reset-form" novalidate>
        <div class="form-group">
          <label for="password">New Password</label>
          <input type="password" id="password" placeholder="At least 8 characters" required>
        </div>
        <div class="form-group">
          <label for="confirm">Confirm New Password</label>
          <input type="password" id="confirm" placeholder="Repeat your new password" required>
        </div>
        <button type="submit" class="btn btn-primary" id="submit-btn">Set New Password</button>
      </form>

      <p class="footer-link"><a href="/pages/login.html">Back to Sign In</a></p>
    </div>
  </div>

  <script src="/js/auth.js"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    const token  = params.get('token');
    const msgEl  = document.getElementById('msg');

    if (!token) {
      document.getElementById('no-token').style.display = 'block';
      document.getElementById('reset-form-wrapper').style.display = 'none';
    }

    function showMsg(text, type) {
      msgEl.textContent = text;
      msgEl.className   = 'msg show ' + type;
    }

    document.getElementById('reset-form')?.addEventListener('submit', async (e) => {
      e.preventDefault();
      msgEl.className = 'msg';
      const password = document.getElementById('password').value;
      const confirm  = document.getElementById('confirm').value;
      if (password.length < 8) { showMsg('Password must be at least 8 characters.', 'error'); return; }
      if (password !== confirm) { showMsg('Passwords do not match.', 'error'); return; }

      const btn = document.getElementById('submit-btn');
      btn.disabled = true;
      btn.textContent = 'Saving…';
      try {
        await auth.resetPassword(token, password);
        showMsg('Password reset successfully. Redirecting to sign in…', 'success');
        setTimeout(() => window.location.replace('/pages/login.html'), 2500);
      } catch (err) {
        showMsg(err.message + ' Request a new link below.', 'error');
        btn.disabled = false;
        btn.textContent = 'Set New Password';
      }
    });
  </script>
</body>
</html>
