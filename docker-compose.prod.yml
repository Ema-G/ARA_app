version: '3.9'

services:
  ara-backend:
    image: ghcr.io/${IMAGE_OWNER}/ara-backend:latest
    container_name: ara-backend-prod
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_JPA_SHOW_SQL=false
      - LOG_LEVEL=WARN
    restart: always
    networks:
      - ara-prod
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  ara-frontend:
    image: ghcr.io/${IMAGE_OWNER}/ara-frontend:latest
    container_name: ara-frontend-prod
    ports:
      - "80:80"
    depends_on:
      ara-backend:
        condition: service_healthy
    restart: always
    networks:
      - ara-prod

networks:
  ara-prod:
    driver: bridge
